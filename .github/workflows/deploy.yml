name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 1. 自动化测试
      - name: Run Tests
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest
          pytest

      # 2. 自动化构建与镜像管理 (Docker Hub)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rag-assistant:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rag-assistant:latest
